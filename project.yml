# ClutterCatcher v4 — XcodeGen project definition (source of truth).
# Never hand-edit the generated .xcodeproj; run `xcodegen generate` after
# adding/removing files. See planning/ccv4-plan.md (D5).
name: ClutterCatcher

options:
  bundleIdPrefix: com.rixun
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.0.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: DNL25ZFSD2
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    # CLOUDKIT_ENV_PRODUCTION mirrors the icloud-container-environment
    # entitlement below into Swift (CloudKitEnvironment.current) — it feeds
    # the sync-identity fingerprint that resets sync bookkeeping when the
    # environment changes. The condition and the entitlement MUST change in
    # lockstep (D15/M3-A); TestFlight/App Store builds are always Production,
    # so the condition stays set in Release regardless of the entitlement.
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG CLOUDKIT_ENV_PRODUCTION"
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) CLOUDKIT_ENV_PRODUCTION"

targets:
  ClutterCatcher:
    type: application
    platform: iOS
    sources:
      - path: ClutterCatcher
    dependencies:
      - package: GRDB
        product: GRDB
      # M7b (U10): the Control Center scan button rides a minimal WidgetKit
      # extension, embedded here. It is dependency-free by design.
      - target: ClutterCatcherControls
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rixun.cluttercatcher
        # iPhone + iPad (M6.2): size-class-driven layout, no
        # UIRequiresFullScreen — Split View / Slide Over / Stage Manager
        # resizing is supported.
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # M4 (T7): compiles every AppIcon-*.appiconset as an alternate icon
        # and registers it in the Info.plist for setAlternateIconName.
        # NOTE: T7 names this ..._APPICON_NAMES — that's the legacy spelling,
        # silently ignored by Xcode 26's build spec; _ASSETS is the real one
        # (verified in AssetCatalogCompiler.xcspec, maps to
        # `--include-all-app-icons`).
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
    info:
      path: ClutterCatcher/Info.plist
      properties:
        CFBundleDisplayName: ClutterCatcher
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # iPad supports every orientation (M6.2); iPhone stays portrait-only.
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        # QR deep links: cluttercatcher://c/<uuid> (plan §3.4)
        CFBundleURLTypes:
          - CFBundleURLName: com.rixun.cluttercatcher
            CFBundleURLSchemes:
              - cluttercatcher
        NSCameraUsageDescription: >-
          ClutterCatcher uses the camera to scan the QR labels on your bins and
          drawers so it can show you what's inside.
        # CloudKit scaffold only in M0/M1 — no sync code until M2 (plan §4).
        UIBackgroundModes:
          - remote-notification
        CKSharingSupported: true
    entitlements:
      path: ClutterCatcher/ClutterCatcher.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.rixun.cluttercatcher
        com.apple.developer.icloud-services:
          - CloudKit
        # Dev-signed builds hit the Production container environment from M3
        # on (D15) — real family data accumulates only in Production.
        # TestFlight/App Store ignore this key (always Production). MUST
        # change in lockstep with CLOUDKIT_ENV_PRODUCTION above.
        com.apple.developer.icloud-container-environment: Production
        aps-environment: development

  # M7b (U10): the Control Center scan control. A WidgetKit extension whose
  # entire content is one ControlWidget button opening cluttercatcher://scan
  # — no GRDB, no app-code dependency, same team/signing family as the app.
  ClutterCatcherControls:
    type: app-extension
    platform: iOS
    sources:
      - path: ClutterCatcherControls
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rixun.cluttercatcher.controls
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: ClutterCatcherControls/Info.plist
      properties:
        CFBundleDisplayName: ClutterCatcher
        # Embedded-extension validation requires these to match the app's.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  ClutterCatcherTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ClutterCatcherTests
    dependencies:
      - target: ClutterCatcher
      # Tests import GRDB directly; without this the test module has no
      # import path for it.
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rixun.cluttercatcher.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ClutterCatcher.app/ClutterCatcher
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ClutterCatcher:
    build:
      targets:
        ClutterCatcher: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClutterCatcherTests
    profile:
      config: Release
    archive:
      config: Release
